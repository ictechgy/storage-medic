<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Storage Medic</title>
  <meta name="description" content="Storage Medic support and privacy information for macOS.">
  <style>
    :root { color-scheme: light dark; --accent: #2563eb; --fg: #111827; --muted: #6b7280; --card: #f8fafc; --line: #e5e7eb; }
    @media (prefers-color-scheme: dark) { :root { --fg: #f9fafb; --muted: #9ca3af; --card: #111827; --line: #374151; } }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--fg); line-height: 1.65; }
    main { max-width: 760px; margin: 0 auto; padding: 64px 24px; }
    h1 { font-size: clamp(2rem, 5vw, 3rem); line-height: 1.1; margin: 0 0 16px; }
    p { font-size: 1.05rem; }
    .muted { color: var(--muted); }
    .cards { display: grid; gap: 16px; margin-top: 32px; }
    a.card { display: block; padding: 22px; border: 1px solid var(--line); border-radius: 18px; background: var(--card); color: inherit; text-decoration: none; }
    a.card:hover { border-color: var(--accent); }
    .card strong { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>Storage Medic</h1>
    <p class="muted">macOS 저장 공간을 점검하고, 정리 전 다시 확인할 수 있도록 돕는 파일 관리 도구입니다.</p>
    <div class="cards">
      <a class="card" href="support/"><strong>Support</strong><br>도움말, 문의 방법, 문제 제보 안내</a>
      <a class="card" href="privacy/"><strong>Privacy Policy</strong><br>데이터 수집 및 로컬 파일 처리 방침</a>
    </div>
  </main>
</body>
</html>
